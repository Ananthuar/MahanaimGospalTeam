<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Programmes | Mahanaim</title>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link rel="stylesheet" href="assets/css/style.css?v=1.1">
</head>

<body>

  <div class="fx-bg-glow"></div>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="assets/images/logo.jpg" alt="Logo" class="brand-img"
          onerror="this.src='https://placehold.co/48x48/1e1e2d/FFF?text=M'">
        <span class="brand-name"><span data-i18n="brandMahanaim">Mahanaim</span> <span class="text-gradient"
            data-i18n="brandTeam">Team</span></span>
      </a>

      <nav class="nav-links" id="mainNav">
        <a href="index.html" data-i18n="navTeam">Team</a>
        <a href="programmes.html" style="color:var(--text-main);" data-i18n="navProgrammes">Programmes</a>
        <a href="church.html" data-i18n="navWorshipCenter">Worship Center</a>
      </nav>

      <div style="display:flex; align-items:center; gap: 1rem;">
        <button id="langToggle" class="btn btn-outline"
          style="padding: 0.4rem 0.8rem; font-size: 0.9rem; border-color: var(--glass-border); border-radius: var(--radius-sm); color: var(--text-main);">ML</button>
        <button class="mobile-toggle" id="mobileToggle"><i class="ph ph-list"></i></button>
      </div>
    </div>
  </header>

  <main style="padding-top: 150px; padding-bottom: 80px;" class="container">

    <div class="glass-panel" style="text-align: center; margin-bottom: 3rem;">
      <h1 style="font-size: 3rem;" data-i18n="progTitle"><span class="text-gradient">Our Programmes</span></h1>
      <p class="text-muted" style="max-width: 600px; margin: 0 auto; font-size: 1.2rem;" data-i18n="progDesc">
        Worship nights, workshops, and outreach initiatives organized by Mahanaim.
      </p>
    </div>

    <!-- Container for dynamic scripts -- JS injects straight into here -->
    <div id="programmes-list" class="cards-grid">
      <!-- Cards dynamically generated by assets/js/main.js -->
    </div>

  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>
        <h3 style="margin-bottom: 0;"><span data-i18n="brandMahanaim">Mahanaim</span> Gospel <span
            data-i18n="brandTeam">Team</span></h3>
        <p class="text-muted" style="margin-top: 0.5rem;" data-i18n="footerTagline">Worship • Outreach • Community</p>
      </div>
      <div class="social-links">
        <a href="https://www.youtube.com/@mahanaimgospelteam" target="_blank" aria-label="YouTube"><i
            class="ph ph-youtube-logo"></i></a>
        <a href="#" aria-label="Instagram"><i class="ph ph-instagram-logo"></i></a>
        <a href="#" aria-label="Facebook"><i class="ph ph-facebook-logo"></i></a>
      </div>
    </div>
  </footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/main.js"></script>

  <script>
    const header = document.querySelector('.site-header');
    const mobileToggle = document.getElementById('mobileToggle');
    const navLinks = document.getElementById('mainNav');

    window.addEventListener('scroll', () => {
      header.style.background = window.scrollY > 50 ? 'rgba(5, 5, 15, 0.9)' : 'rgba(5, 5, 15, 0.4)';
    });

    mobileToggle.addEventListener('click', () => {
      navLinks.classList.toggle('active');
    });

    // Animate cards magically on inject
    const container = document.getElementById('programmes-list');
    if (container) {
      const mo = new MutationObserver(() => {
        const cards = container.querySelectorAll('.card');
        cards.forEach((card, idx) => {
          if (!card.dataset.animated) {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            card.dataset.animated = 'true';
            setTimeout(() => {
              card.style.transition = 'all 0.4s ease';
              card.style.opacity = '1';
              card.style.transform = 'none';
            }, idx * 100);
          }
        });
      });
      mo.observe(container, { childList: true, subtree: true });
    }
  </script>
</body>

</html>
